<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Config Files - CraneStudio</title>
    <link rel="icon" href="static/crane-avatar.webp" type="image/webp">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --orange: #ff8516;
            --orange-dark: #ef6910;
            --brand-red: #ef3027;
            --brand-navy: #17294f;
            --watch-blue: #2678d8;
            --green: #6eaf31;
            --ink: #2f2018;
            --muted: #786b63;
            --line: #f1e5d8;
            --cream: #fffaf2;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            color: var(--ink);
            background:
                radial-gradient(circle at 8% 12%, rgba(255, 209, 143, 0.2), transparent 25%),
                linear-gradient(180deg, #fffdf9 0%, #fff8ee 52%, #fffdf9 100%);
            font-family: "Nunito Sans", "Avenir Next", Avenir, sans-serif;
            line-height: 1.5;
            padding: 40px 20px;
        }

        a { color: inherit; text-decoration: none; }

        .container {
            width: min(720px, 100%);
            margin: 0 auto;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 28px;
            color: var(--muted);
            font-size: 14px;
            font-weight: 700;
            transition: color 0.2s ease;
        }

        .back-link:hover { color: var(--orange-dark); }

        .page-header { margin-bottom: 32px; }

        .page-header h1 {
            font-family: "Fredoka", "Arial Rounded MT Bold", sans-serif;
            font-size: clamp(32px, 5vw, 44px);
            font-weight: 700;
            letter-spacing: -1px;
            color: var(--brand-navy);
        }

        .page-header h1 .accent { color: var(--brand-red); }

        .page-header p {
            margin-top: 8px;
            color: var(--muted);
            font-size: 16px;
        }

        .file-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .file-card {
            display: block;
            padding: 22px 24px;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(241, 229, 216, 0.9);
            border-radius: 22px;
            box-shadow: 0 8px 22px rgba(84, 59, 32, 0.08);
            transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
        }

        .file-card:hover,
        .file-card:focus-visible {
            transform: translateY(-4px);
            border-color: #ffd09b;
            box-shadow: 0 18px 42px rgba(123, 74, 27, 0.16);
            outline: none;
        }

        .file-card-inner {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .platform-icon {
            width: 44px;
            height: 44px;
            flex: 0 0 auto;
            display: inline-grid;
            place-items: center;
            border-radius: 14px;
            line-height: 1;
        }

        .platform-icon svg {
            width: 26px;
            height: 26px;
            fill: currentColor;
        }

        .platform-icon.ios { color: var(--orange); background: #fff0dc; }
        .platform-icon.watch { color: var(--watch-blue); background: #eaf4ff; }
        .platform-icon.android { color: var(--green); background: #f2f9e9; }

        .file-info { flex: 1; min-width: 0; }

        .file-name {
            display: block;
            font-size: 17px;
            font-weight: 800;
            color: var(--ink);
            word-break: break-all;
        }

        .file-desc {
            display: block;
            margin-top: 2px;
            font-size: 13px;
            color: var(--muted);
        }

        .arrow {
            flex: 0 0 auto;
            color: var(--orange-dark);
            font-size: 20px;
            font-weight: 800;
            transition: transform 0.25s ease;
        }

        .file-card:hover .arrow,
        .file-card:focus-visible .arrow {
            transform: translateX(4px);
        }

        footer {
            margin-top: 40px;
            text-align: center;
            color: var(--muted);
            font-size: 13px;
        }

        @media (max-width: 560px) {
            body { padding: 28px 16px; }
            .file-card { padding: 18px; }
            .file-card-inner { gap: 14px; }
            .platform-icon { width: 40px; height: 40px; }
            .platform-icon svg { width: 22px; height: 22px; }
            .file-name { font-size: 15px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <a class="back-link" href="index.html">← Back to Home</a>

        <header class="page-header">
            <h1>Config <span class="accent">Files</span></h1>
            <p>应用列表配置 JSON 文件，点击查看内容。</p>
        </header>

        <ul class="file-list">
            <li>
                <a class="file-card" href="static/more_apps_ios.json" target="_blank" rel="noopener">
                    <div class="file-card-inner">
                        <span class="platform-icon ios" aria-hidden="true">
                            <svg viewBox="0 0 24 24"><path d="M17.05 12.54c.03 3.23 2.83 4.31 2.86 4.33-.02.08-.45 1.55-1.48 3.07-.9 1.31-1.84 2.62-3.31 2.65-1.45.03-1.91-.85-3.56-.85-1.66 0-2.17.82-3.54.88-1.42.05-2.5-1.43-3.41-2.74-1.86-2.69-3.28-7.6-1.37-10.92A5.3 5.3 0 0 1 7.75 6.4c1.4-.03 2.72.94 3.56.94.84 0 2.42-1.17 4.08-1 .69.03 2.65.28 3.9 2.11-.1.06-2.33 1.36-2.24 4.09ZM14.3 4.6c.75-.91 1.26-2.18 1.12-3.44-1.08.04-2.38.72-3.16 1.63-.69.8-1.3 2.09-1.14 3.32 1.2.09 2.43-.61 3.18-1.51Z"/></svg>
                        </span>
                        <span class="file-info">
                            <span class="file-name">more_apps_ios.json</span>
                            <span class="file-desc">iOS 应用列表配置</span>
                        </span>
                        <span class="arrow" aria-hidden="true">→</span>
                    </div>
                </a>
            </li>
            <li>
                <a class="file-card" href="static/more_apps_iwatch.json" target="_blank" rel="noopener">
                    <div class="file-card-inner">
                        <span class="platform-icon watch" aria-hidden="true">
                            <svg viewBox="0 0 24 24"><path d="M8.25 1h7.5l.86 3.02A5 5 0 0 1 20 8.75v6.5a5 5 0 0 1-3.39 4.73L15.75 23h-7.5l-.86-3.02A5 5 0 0 1 4 15.25v-6.5a5 5 0 0 1 3.39-4.73L8.25 1Zm.75 5a3 3 0 0 0-3 3v6a3 3 0 0 0 3 3h6a3 3 0 0 0 3-3V9a3 3 0 0 0-3-3H9Zm3 2.25A3.75 3.75 0 1 1 12 15.75a3.75 3.75 0 0 1 0-7.5Zm0 1.5A2.25 2.25 0 1 0 12 14.25a2.25 2.25 0 0 0 0-4.5Z"/></svg>
                        </span>
                        <span class="file-info">
                            <span class="file-name">more_apps_iwatch.json</span>
                            <span class="file-desc">Apple Watch 应用列表配置</span>
                        </span>
                        <span class="arrow" aria-hidden="true">→</span>
                    </div>
                </a>
            </li>
            <li>
                <a class="file-card" href="static/more_apps_android.json" target="_blank" rel="noopener">
                    <div class="file-card-inner">
                        <span class="platform-icon android" aria-hidden="true">
                            <svg viewBox="0 0 24 24"><path d="m17.6 9.48 1.84-3.18a.55.55 0 0 0-.95-.55l-1.86 3.21A11.5 11.5 0 0 0 12 8a11.5 11.5 0 0 0-4.63.96L5.51 5.75a.55.55 0 1 0-.95.55L6.4 9.48A8.92 8.92 0 0 0 2.03 16h19.94a8.92 8.92 0 0 0-4.37-6.52ZM7.5 13.25a1 1 0 1 1 0-2 1 1 0 0 1 0 2Zm9 0a1 1 0 1 1 0-2 1 1 0 0 1 0 2ZM2 17v1.5A2.5 2.5 0 0 0 4.5 21h1v1.5a1.5 1.5 0 0 0 3 0V21h7v1.5a1.5 1.5 0 0 0 3 0V21h1a2.5 2.5 0 0 0 2.5-2.5V17H2Z"/></svg>
                        </span>
                        <span class="file-info">
                            <span class="file-name">more_apps_android.json</span>
                            <span class="file-desc">Android 应用列表配置</span>
                        </span>
                        <span class="arrow" aria-hidden="true">→</span>
                    </div>
                </a>
            </li>
        </ul>

        <footer>
            <p>© 2018 CraneStudio</p>
        </footer>
    </div>
</body>
</html>
