<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="CraneStudio - 用心打造每一款休闲游戏">
    <title>CraneStudio - 休闲游戏工作室</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <style>
        :root {
            /* 颜色变量 */
            --bg-gradient-start: #FFF8F0;
            --bg-gradient-end: #FFF5E6;
            --hero-bg: #FFFCF5;
            --card-bg: #FFFFFF;
            --primary-color: #FF9F43;
            --primary-hover: #F7833D;
            --secondary-color: #FFD4A3;
            --text-primary: #4A4A4A;
            --text-secondary: #888888;
            --border-color: #F0E6D8;

            /* 圆角变量 */
            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 12px;
            --radius-pill: 50px;

            /* 阴影变量 */
            --shadow-card: 0 4px 20px rgba(255, 159, 67, 0.1);
            --shadow-card-hover: 0 8px 30px rgba(255, 159, 67, 0.2);
            --shadow-popup: 0 8px 32px rgba(0, 0, 0, 0.15);
        }

        /* 全局重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
            min-height: 100vh;
            color: var(--text-primary);
            line-height: 1.6;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        img {
            max-width: 100%;
            display: block;
        }

        /* 容器 */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 12px;
            }
        }

        /* Hero 区域 */
        .hero {
            background-color: var(--hero-bg);
            border-radius: var(--radius-lg);
            margin-bottom: 32px;
            padding: 60px 20px;
            text-align: center;
            box-shadow: var(--shadow-card);
        }

        .hero-content {
            max-width: 600px;
            margin: 0 auto;
        }

        .hero-logo {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .hero-title {
            font-size: 32px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 12px;
        }

        .hero-subtitle {
            font-size: 18px;
            color: var(--text-secondary);
        }

        @media (max-width: 768px) {
            .hero {
                padding: 40px 16px;
                margin-bottom: 20px;
                border-radius: var(--radius-md);
            }

            .hero-logo {
                font-size: 36px;
            }

            .hero-title {
                font-size: 24px;
            }

            .hero-subtitle {
                font-size: 16px;
            }
        }

        /* 游戏分组 */
        .game-group {
            background-color: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: 32px 24px;
            margin-bottom: 32px;
            box-shadow: var(--shadow-card);
        }

        .group-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--border-color);
        }

        /* 游戏网格 */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 24px;
        }

        /* 游戏卡片 */
        .game-card {
            background-color: var(--card-bg);
            border-radius: var(--radius-md);
            padding: 20px;
            text-align: center;
            border: 1px solid var(--border-color);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        .game-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-card-hover);
        }

        .game-icon {
            width: 100px;
            height: 100px;
            border-radius: var(--radius-sm);
            margin: 0 auto 16px;
            object-fit: cover;
        }

        .game-name {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 16px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .btn-detail {
            display: inline-block;
            background: linear-gradient(135deg, var(--primary-color), var(--primary-hover));
            color: white;
            padding: 10px 20px;
            border-radius: var(--radius-pill);
            font-size: 14px;
            font-weight: 500;
            border: none;
            cursor: pointer;
            transition: opacity 0.3s ease;
        }

        .btn-detail:hover {
            opacity: 0.9;
        }

        /* 更多游戏按钮 */
        .more-games {
            text-align: center;
            padding-top: 8px;
        }

        .btn-more {
            display: inline-block;
            background: linear-gradient(135deg, var(--primary-color), var(--primary-hover));
            color: white;
            padding: 12px 32px;
            border-radius: var(--radius-pill);
            font-size: 14px;
            font-weight: 600;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .btn-more:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(255, 159, 67, 0.3);
        }

        @media (max-width: 768px) {
            .game-group {
                padding: 20px 16px;
                margin-bottom: 20px;
                border-radius: var(--radius-md);
            }

            .group-title {
                font-size: 18px;
                margin-bottom: 16px;
            }

            .games-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
                margin-bottom: 16px;
            }

            .game-card {
                padding: 16px;
            }

            .game-icon {
                width: 80px;
                height: 80px;
                margin-bottom: 12px;
            }

            .game-name {
                font-size: 14px;
                margin-bottom: 12px;
            }

            .btn-detail {
                padding: 8px 16px;
                font-size: 12px;
            }
        }

        /* 底部 */
        .footer {
            text-align: center;
            padding: 40px 20px;
        }

        .footer-divider {
            height: 1px;
            background-color: var(--border-color);
            margin-bottom: 24px;
        }

        .copyright {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .footer-links a {
            font-size: 14px;
            color: var(--text-primary);
            transition: color 0.3s ease;
        }

        .footer-links a:hover {
            color: var(--primary-color);
        }

        .separator {
            color: var(--text-secondary);
        }

        @media (max-width: 768px) {
            .footer {
                padding: 24px 16px;
            }

            .copyright,
            .footer-links a {
                font-size: 12px;
            }
        }

        /* 遮罩层 */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: transparent;
            z-index: 998;
            display: none;
        }

        .overlay.active {
            display: block;
        }

        /* 二维码弹窗 */
        .qr-popup {
            position: fixed;
            z-index: 999;
            display: none;
            pointer-events: none;
        }

        .qr-popup.active {
            display: block;
            pointer-events: auto;
        }

        .qr-popup-content {
            background-color: var(--card-bg);
            border-radius: var(--radius-md);
            padding: 20px;
            box-shadow: var(--shadow-popup);
            width: 240px;
            text-align: center;
            position: relative;
        }

        .qr-close {
            position: absolute;
            top: 8px;
            right: 12px;
            background: none;
            border: none;
            font-size: 20px;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 4px;
            line-height: 1;
        }

        .qr-close:hover {
            color: var(--text-primary);
        }

        .qr-code {
            width: 160px;
            height: 160px;
            margin: 0 auto 16px;
            background-color: white;
            padding: 8px;
        }

        .qr-code canvas {
            width: 100% !important;
            height: 100% !important;
        }

        .qr-game-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .qr-hint {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .qr-arrow {
            width: 0;
            height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 10px solid var(--card-bg);
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            top: -10px;
        }

        .qr-arrow.arrow-up {
            border-top: none;
            border-bottom: 10px solid var(--card-bg);
            top: auto;
            bottom: -10px;
        }
    </style>
</head>
<body>
    <!-- Hero Section -->
    <header class="hero">
        <div class="container">
            <div class="hero-content">
                <div class="hero-logo">🎮 CraneStudio</div>
                <h1 class="hero-title">用心打造每一款休闲游戏</h1>
                <p class="hero-subtitle">让快乐触手可及</p>
            </div>
        </div>
    </header>

    <!-- Games Section -->
    <main class="container">
        <!-- iOS Games -->
        <section class="game-group" id="ios-games">
            <h2 class="group-title">🍎 iOS 游戏</h2>
            <div class="games-grid" id="ios-games-grid">
                <!-- 游戏卡片将由 JavaScript 动态加载 -->
            </div>
            <div class="more-games">
                <a href="https://apps.apple.com/cn/developer/id1061441649" class="btn-more" target="_blank">
                    更多 iOS 游戏 →
                </a>
            </div>
        </section>

        <!-- Android Games -->
        <section class="game-group" id="android-games">
            <h2 class="group-title">🤖 Android 游戏</h2>
            <div class="games-grid" id="android-games-grid">
                <!-- 游戏卡片将由 JavaScript 动态加载 -->
            </div>
            <div class="more-games">
                <a href="https://play.google.com/store/apps/dev?id=8588964176065625833" class="btn-more" target="_blank">
                    更多 Android 游戏 →
                </a>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-divider"></div>
        <p class="copyright" id="copyright"></p>
        <div class="footer-links">
            <a href="release/privacy.html">隐私政策</a>
            <span class="separator">·</span>
            <a href="release/tos.html">服务条款</a>
        </div>
    </footer>

    <script>
        // 判断是否为移动设备
        function isMobile() {
            return /Android|webOS|iPhone|iPad|iPod/i.test(navigator.userAgent);
        }

        // 获取当前年份并更新版权信息
        function updateCopyright() {
            const year = new Date().getFullYear();
            document.getElementById('copyright').textContent = `© 2018-${year} CraneStudio`;
        }

        // 创建游戏卡片 HTML
        function createGameCard(game, platform) {
            const card = document.createElement('div');
            card.className = 'game-card';
            card.innerHTML = `
                <img class="game-icon" src="${game.icon}" alt="${game.name}" loading="lazy">
                <p class="game-name">${game.name}</p>
                <button class="btn-detail" data-link="${game.link}" data-name="${game.name}" data-platform="${platform}">
                    查看详情 →
                </button>
            `;
            return card;
        }

        // 加载并渲染游戏列表
        async function loadGames(jsonUrl, containerId, platform) {
            const container = document.getElementById(containerId);
            try {
                const response = await fetch(jsonUrl);
                const data = await response.json();
                data.appList.forEach(game => {
                    const card = createGameCard(game, platform);
                    container.appendChild(card);
                });
            } catch (error) {
                console.error('Failed to load games:', error);
                container.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: var(--text-secondary);">游戏列表加载失败</p>';
            }
        }

        // 二维码弹窗相关元素
        const qrPopup = document.getElementById('qr-popup');
        const qrCode = document.getElementById('qr-code');
        const qrGameName = document.getElementById('qr-game-name');
        const qrArrow = document.getElementById('qr-arrow');
        const qrClose = document.getElementById('qr-close');
        const overlay = document.getElementById('overlay');

        // 显示二维码弹窗
        function showQRCodePopup(url, gameName, event) {
            // 清空之前的二维码
            qrCode.innerHTML = '';

            // 生成二维码
            QRCode.toCanvas(url, { width: 144, margin: 0 }, function(error, canvas) {
                if (error) {
                    console.error(error);
                    return;
                }
                qrCode.appendChild(canvas);
            });

            // 设置游戏名称
            qrGameName.textContent = gameName;

            // 计算弹窗位置
            const rect = event.target.getBoundingClientRect();
            const popupWidth = 240;
            const popupHeight = 280;

            let left = rect.left + rect.width / 2 - popupWidth / 2;
            let top = rect.bottom + 20;
            let arrowUp = false;

            // 检查是否超出右边界
            if (left + popupWidth > window.innerWidth - 20) {
                left = window.innerWidth - popupWidth - 20;
            }

            // 检查是否超出左边界
            if (left < 20) {
                left = 20;
            }

            // 检查是否超出下边界
            if (top + popupHeight > window.innerHeight - 20) {
                top = rect.top - popupHeight - 20;
                arrowUp = true;
            }

            // 设置箭头方向
            if (arrowUp) {
                qrArrow.classList.add('arrow-up');
            } else {
                qrArrow.classList.remove('arrow-up');
            }

            // 设置弹窗位置
            qrPopup.style.left = `${left}px`;
            qrPopup.style.top = `${top}px`;

            // 显示弹窗和遮罩
            qrPopup.classList.add('active');
            overlay.classList.add('active');
        }

        // 隐藏二维码弹窗
        function hideQRCodePopup() {
            qrPopup.classList.remove('active');
            overlay.classList.remove('active');
        }

        // 绑定关闭弹窗事件
        qrClose.addEventListener('click', hideQRCodePopup);
        overlay.addEventListener('click', hideQRCodePopup);

        // 处理游戏卡片点击事件（事件委托）
        document.addEventListener('click', function(event) {
            if (event.target.classList.contains('btn-detail')) {
                const link = event.target.dataset.link;
                const name = event.target.dataset.name;
                const platform = event.target.dataset.platform;

                if (platform === 'ios') {
                    if (isMobile()) {
                        // 手机端直接跳转
                        window.location.href = link;
                    } else {
                        // PC端显示二维码弹窗
                        event.preventDefault();
                        showQRCodePopup(link, name, event);
                    }
                } else {
                    // Android 所有端直接跳转
                    window.location.href = link;
                }
            }
        });

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 更新版权年份
            updateCopyright();

            // 加载游戏列表
            loadGames('static/more_apps_ios.json', 'ios-games-grid', 'ios');
            loadGames('static/more_apps_android.json', 'android-games-grid', 'android');
        });
    </script>

    <!-- QR Code Popup -->
    <div class="qr-popup" id="qr-popup">
        <div class="qr-popup-content">
            <button class="qr-close" id="qr-close">&times;</button>
            <div class="qr-code" id="qr-code"></div>
            <p class="qr-game-name" id="qr-game-name"></p>
            <p class="qr-hint">请用手机扫码前往 App Store</p>
        </div>
        <div class="qr-arrow" id="qr-arrow"></div>
    </div>

    <!-- Overlay for closing popup -->
    <div class="overlay" id="overlay"></div>
</body>
</html>
