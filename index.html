<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="CraneStudio - 用心打造每一款休闲游戏">
    <title>CraneStudio - 休闲游戏工作室</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <style>
        :root {
            /* 颜色变量 */
            --bg-gradient-start: #FFF8F0;
            --bg-gradient-end: #FFF5E6;
            --hero-bg: #FFFCF5;
            --card-bg: #FFFFFF;
            --primary-color: #FF9F43;
            --primary-hover: #F7833D;
            --secondary-color: #FFD4A3;
            --text-primary: #4A4A4A;
            --text-secondary: #888888;
            --border-color: #F0E6D8;

            /* 圆角变量 */
            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 12px;
            --radius-pill: 50px;

            /* 阴影变量 */
            --shadow-card: 0 4px 20px rgba(255, 159, 67, 0.1);
            --shadow-card-hover: 0 8px 30px rgba(255, 159, 67, 0.2);
            --shadow-popup: 0 8px 32px rgba(0, 0, 0, 0.15);
        }

        /* 全局重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
            min-height: 100vh;
            color: var(--text-primary);
            line-height: 1.6;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        img {
            max-width: 100%;
            display: block;
        }

        /* 容器 */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 12px;
            }
        }

        /* Hero 区域 */
        .hero {
            background-color: var(--hero-bg);
            border-radius: var(--radius-lg);
            margin-bottom: 32px;
            padding: 60px 20px;
            text-align: center;
            box-shadow: var(--shadow-card);
        }

        .hero-content {
            max-width: 600px;
            margin: 0 auto;
        }

        .hero-logo {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .hero-title {
            font-size: 32px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 12px;
        }

        .hero-subtitle {
            font-size: 18px;
            color: var(--text-secondary);
        }

        @media (max-width: 768px) {
            .hero {
                padding: 40px 16px;
                margin-bottom: 20px;
                border-radius: var(--radius-md);
            }

            .hero-logo {
                font-size: 36px;
            }

            .hero-title {
                font-size: 24px;
            }

            .hero-subtitle {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <!-- Hero Section -->
    <header class="hero">
        <div class="container">
            <div class="hero-content">
                <div class="hero-logo">🎮 CraneStudio</div>
                <h1 class="hero-title">用心打造每一款休闲游戏</h1>
                <p class="hero-subtitle">让快乐触手可及</p>
            </div>
        </div>
    </header>
    <script>
        // JavaScript 代码将在后续步骤添加
    </script>
</body>
</html>
